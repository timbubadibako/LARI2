<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Identity Dossier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@500;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-graffiti { font-family: 'Permanent Marker', cursive; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .container-mobile {
            width: 380px;
            height: 800px;
            background-color: #080808;
            border: 8px solid #fff;
            position: relative;
            overflow: hidden;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(255,255,255,0.05);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* MINIMIZED SLANT HEADER */
        .level-patch {
            background-color: #ccff00;
            color: #000;
            padding: 6px 15px 6px 10px;
            clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
            z-index: 20;
        }
        .name-patch {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 12px 6px 15px;
            clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%);
            margin-left: -10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* FACTION COLOR PICKER */
        .color-dot {
            width: 100%;
            height: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.active { border: 2px solid #fff; box-shadow: 0 0 10px currentColor; }

        /* SINGLE ROW MEDALS */
        .badge-grid {
            display: grid;
            grid-template-cols: repeat(5, 1fr);
            gap: 8px;
        }
        .badge-item {
            aspect-ratio: 1;
            background: #111;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono';
            font-size: 8px;
            text-align: center;
            opacity: 0.2;
            text-transform: uppercase;
        }
        .badge-item.unlocked { 
            opacity: 1; 
            border-color: #ccff00; 
            color: #ccff00;
        }
        .badge-more {
            aspect-ratio: 1;
            background: #fff;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue';
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .badge-more:hover { background: #ccff00; }

        .tag-canvas {
            height: 100px;
            background: #000;
            border: 2px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* SKEWED NAV ISLAND */
        .nav-island {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) skewX(3deg);
            background: #fff;
            padding: 1px;
            width: 80%;
            z-index: 100;
        }
        .nav-inner {
            background: #000;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
        }
        .nav-icon { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); }
        .nav-icon.active { background: #ccff00; border-color: #ccff00; }
        .nav-icon.circle { border-radius: 50%; }

    </style>
</head>
<body class="bg-zinc-950 flex flex-col items-center py-10">

    <div class="container-mobile">
        
        <!-- HEADER -->
        <div class="p-6 pb-0">
            <div class="flex items-stretch">
                <div class="level-patch flex flex-col justify-center">
                    <span class="text-[8px] font-black uppercase">LVL</span>
                    <span class="text-2xl font-bebas leading-none">42</span>
                </div>
                <div class="name-patch flex flex-col justify-center">
                    <span class="text-[10px] font-bold uppercase tracking-tight">AGENT_JRILLYM</span>
                </div>
            </div>
        </div>

        <div class="scroll-area space-y-10">
            
            <!-- FACTION & IDENTITY -->
            <section class="space-y-4">
                <h2 class="text-xl font-bebas tracking-widest border-b border-white/10 pb-1">IDENTITY_CUSTOM</h2>
                <div class="space-y-4">
                    <div>
                        <p class="text-[8px] font-black opacity-40 uppercase mb-2">Active_Radiation_Signal</p>
                        <div class="grid grid-cols-7 gap-1">
                            <div class="color-dot active bg-[#ccff00]" style="color: #ccff00"></div>
                            <div class="color-dot bg-[#ff007a]"></div>
                            <div class="color-dot bg-[#00f0ff]"></div>
                            <div class="color-dot bg-[#ff5f00]"></div>
                            <div class="color-dot bg-[#bc00ff]"></div>
                            <div class="color-dot bg-[#fff000]"></div>
                            <div class="color-dot bg-[#ff0000]"></div>
                        </div>
                    </div>
                    <div>
                        <p class="text-[8px] font-black opacity-40 uppercase mb-2">Signature_Tag</p>
                        <div class="tag-canvas">
                            <span class="font-graffiti text-4xl text-[#ccff00] rotate-[-5deg]">JRILLYM_01</span>
                            <span class="absolute bottom-1 right-2 text-[7px] font-mono opacity-20">EDIT_TAG</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- CAREER STATS -->
            <section class="space-y-4">
                <h2 class="text-xl font-bebas tracking-widest border-b border-white/10 pb-1">CAREER_DOSSIER</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-zinc-900 p-4 border-l-2 border-[#ccff00]">
                        <p class="text-[8px] opacity-40 uppercase">Total_Capture</p>
                        <p class="text-3xl font-bebas">1,240 <span class="text-xs">KM</span></p>
                    </div>
                    <div class="bg-zinc-900 p-4 border-l-2 border-white">
                        <p class="text-[8px] opacity-40 uppercase">Sectors_Held</p>
                        <p class="text-3xl font-bebas">84 <span class="text-xs">GRIDS</span></p>
                    </div>
                </div>
                <div class="bg-zinc-900 p-4 border-l-2 border-white/20">
                    <p class="text-[8px] opacity-40 uppercase">Global_Rank</p>
                    <p class="text-3xl font-bebas">#4 <span class="text-xs text-zinc-500">KUNINGAN</span></p>
                </div>
            </section>

            <!-- ACHIEVEMENTS -->
            <section class="space-y-4">
                <div class="flex justify-between items-end border-b border-white/10 pb-1">
                    <h2 class="text-xl font-bebas tracking-widest">MEDALS_RECON</h2>
                    <span class="text-[8px] font-mono opacity-30 uppercase">4_UNLOCKED</span>
                </div>
                <div class="badge-row">
                    <div class="badge-mini unlocked">FIRST<br/>LOOP</div>
                    <div class="badge-mini unlocked">10KM<br/>RUN</div>
                    <div class="badge-mini unlocked">SECTOR<br/>BOS</div>
                    <div class="badge-mini unlocked">ACE</div>
                    <div class="badge-more-mini">SEE<br/>MORE</div>
                </div>
            </section>

        </div>

        <!-- NAV OVERLAY -->
        <div class="nav-island">
            <div class="nav-inner">
                <div class="nav-icon"></div>
                <div class="nav-icon"></div>
                <div class="nav-icon"></div>
                <div class="nav-icon circle active"></div>
            </div>
        </div>

    </div>

</body>
</html>
