<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Unified Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .cross-lines {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.03),
                rgba(255, 255, 255, 0.03) 10px,
                transparent 10px,
                transparent 20px
            );
        }

        .hazard-stripes {
            background: repeating-linear-gradient(-45deg, #fff, #fff 5px, #000 5px, #000 10px);
        }

        .hazard-bg-neon {
            background: repeating-linear-gradient(-45deg, #ccff00, #ccff00 5px, #000 5px, #000 10px);
        }

        /* INTEGRATED PRECISION SLANT HEADER */
        .level-patch {
            background-color: #ccff00;
            color: #000;
            padding: 10px 40px 10px 20px;
            clip-path: polygon(0 0, 100% 0, calc(100% - 30px) 100%, 0 100%);
            z-index: 20;
            position: relative;
        }

        .name-patch {
            background-color: #1a1a1e;
            color: #fff;
            padding: 10px 20px 10px 35px;
            clip-path: polygon(30px 0, 100% 0, 100% 100%, 0 100%);
            margin-left: -30px; 
            flex: 1;
        }

        /* FLOATING SKEWED NAV */
        .nav-island {
            background: #fff;
            padding: 2px;
            transform: rotate(-1deg) skewX(2deg);
            box-shadow: 10px 10px 0 rgba(204, 255, 0, 0.3);
        }

        .container-mobile {
            width: 380px;
            height: 800px;
            background-color: #080808;
            border: 10px solid #fff;
            position: relative;
            overflow: hidden;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        .map-recon {
            flex: 1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
        }

        .xp-bar { height: 4px; background: #000; margin-top: 8px; width: 100%; overflow: hidden; }
        .xp-progress { height: 100%; background: #ccff00; width: 75%; }
    </style>
</head>
<body class="bg-zinc-900 p-8 flex flex-col items-center">

    <div class="container-mobile cross-lines p-6">
        
        <!-- HEADER INTEGRATION -->
        <div class="flex items-stretch mb-8">
            <div class="level-patch flex flex-col justify-center">
                <span class="text-[8px] font-black uppercase opacity-60">Level</span>
                <span class="text-4xl font-bebas leading-none">42</span>
            </div>
            <div class="name-patch flex flex-col justify-center border-t border-zinc-800">
                <div class="flex justify-between items-baseline mb-0">
                    <span class="text-xs font-black italic tracking-tighter">AGENT_JRILLYM</span>
                    <span class="text-[8px] opacity-30 font-mono">750/1000 XP</span>
                </div>
                <div class="xp-bar"><div class="xp-progress"></div></div>
            </div>
        </div>

        <!-- DISTRICT BROADCAST -->
        <div class="space-y-1 mb-8">
            <div class="flex items-center gap-2">
                <div class="w-1 h-8 hazard-bg-neon"></div>
                <div>
                    <p class="text-[9px] font-mono text-[#ccff00] tracking-tighter">LOC_RECON: KNGN-32.08.15</p>
                    <h2 class="text-4xl font-bebas leading-none">KEC. CILIMUS</h2>
                </div>
            </div>
            <h3 class="text-lg font-bebas text-zinc-500 tracking-[0.2em] ml-3">KABUPATEN KUNINGAN</h3>
        </div>

        <!-- MAP RECON AREA -->
        <div class="map-recon border-y-2 border-zinc-900 flex items-center justify-center">
            <div class="text-[10px] font-mono opacity-10 tracking-[0.5em] animate-pulse">SATELLITE_LINK_WAITING...</div>
            
            <!-- Quick HUD Overlays on Map -->
            <div class="absolute top-4 right-4 bg-black/60 border border-zinc-800 p-2 text-right">
                <p class="text-[8px] opacity-40 uppercase">Territory_Held</p>
                <p class="text-xl font-bebas">12.4%</p>
            </div>
            <div class="absolute bottom-4 left-4 flex gap-2">
                 <div class="bg-[#ccff00] text-black px-2 py-0.5 text-[10px] font-black uppercase skew-x-[-15deg]">Bounty: 3</div>
                 <div class="bg-white text-black px-2 py-0.5 text-[10px] font-black uppercase skew-x-[-15deg]">Safe_Zone</div>
            </div>
        </div>

        <!-- BOTTOM ACTION & NAV -->
        <div class="pt-8 pb-4 space-y-8">
            <!-- BIG START BUTTON -->
            <div class="relative group cursor-pointer">
                <div class="absolute inset-0 hazard-bg-neon opacity-10 group-hover:opacity-30 transition-opacity"></div>
                <button class="relative w-full border-2 border-white py-4 flex items-center justify-center gap-4 overflow-hidden">
                    <span class="text-4xl font-bebas tracking-[0.2em]">START MISSION</span>
                    <div class="w-2 h-2 bg-[#ccff00] animate-ping"></div>
                </button>
            </div>

            <!-- FLOATING NAV INTEGRATION -->
            <div class="nav-island">
                <nav class="bg-black p-4 flex justify-between items-center px-10">
                    <!-- Nexus (Active) -->
                    <div class="w-6 h-6 bg-[#ccff00] shadow-[0_0_10px_#ccff00]"></div>
                    <!-- History -->
                    <div class="w-6 h-6 border-2 border-white/40 rotate-45"></div>
                    <!-- Social -->
                    <div class="w-6 h-6 border-2 border-white/40"></div>
                    <!-- Profile -->
                    <div class="w-6 h-6 border-2 border-white/40 rounded-full"></div>
                </nav>
            </div>
            
            <div class="text-center">
                <p class="text-[8px] font-mono opacity-20 uppercase tracking-[0.5em]">LARI_SYSTEM_OPERATIONAL_V3.2</p>
            </div>
        </div>

    </div>

</body>
</html>
