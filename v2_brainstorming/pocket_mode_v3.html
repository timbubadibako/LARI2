<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Pocket Mode Sharp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        
        .container-mobile {
            width: 380px;
            height: 800px;
            background-color: #000;
            border: 8px solid #111;
            border-radius: 0px; /* SHARP */
            position: relative;
            overflow: hidden;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 40px;
        }

        .giant-metric {
            font-size: 10rem;
            line-height: 0.8;
            color: #ccff00;
            text-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
        }

        /* SHARP INDUSTRIAL SLIDER */
        .unlock-zone {
            width: 100%;
            height: 70px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #fff;
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
            clip-path: polygon(2% 0, 100% 0, 98% 100%, 0 100%);
            border-radius: 0;
        }

        .unlock-slider {
            position: absolute;
            left: 0;
            width: 80px;
            height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
            transition: all 0.2s;
            border-radius: 0;
        }

        .slider-text {
            width: 100%;
            text-align: center;
            font-family: 'Bebas Neue';
            font-size: 20px;
            letter-spacing: 4px;
            color: #fff;
            opacity: 0.3;
        }

        .hazard-bg-neon-mini {
            background: repeating-linear-gradient(-45deg, #ccff00, #ccff00 2px, transparent 2px, transparent 4px);
            width: 40px;
            height: 10px;
            position: absolute;
            right: 20px;
            opacity: 0.5;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(204, 255, 0, 0.1);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0%; }
            to { top: 100%; }
        }

        .hazard-bg-dark {
            background: repeating-linear-gradient(-45deg, #111, #111 10px, #000 10px, #000 20px);
        }
    </style>
</head>
<body class="bg-zinc-950 flex flex-col items-center py-10">

    <div class="container-mobile hazard-bg-dark">
        <div class="scanline"></div>

        <!-- TOP: MINIMAL STATUS -->
        <div class="text-center">
            <p class="text-[10px] font-mono opacity-30 tracking-[0.5em] uppercase mb-1">Status: Locked</p>
            <p class="font-bebas text-2xl tracking-widest opacity-60">MISSION_IN_PROGRESS</p>
        </div>

        <!-- CENTER: GIANT TELEMETRY -->
        <div class="text-center">
            <h1 class="giant-metric font-bebas">12.4</h1>
            <p class="font-bebas text-4xl mt-4 tracking-widest opacity-40">KILOMETERS</p>
            
            <div class="mt-12 flex justify-center gap-12">
                <div class="text-center">
                    <p class="text-[10px] opacity-30 uppercase font-bold">Pace</p>
                    <p class="text-4xl font-bebas">05:20</p>
                </div>
                <div class="text-center border-l border-zinc-800 pl-12">
                    <p class="text-[10px] opacity-30 uppercase font-bold">Time</p>
                    <p class="text-4xl font-bebas text-white">45:12</p>
                </div>
            </div>
        </div>

        <!-- BOTTOM: INTERACTIVE UNLOCK -->
        <div class="w-full space-y-6">
            <div class="unlock-zone">
                <div class="slider-text">SLIDE_TO_UNLOCK</div>
                <div class="unlock-slider">
                    <span class="font-black text-2xl">>></span>
                </div>
                <div class="hazard-bg-neon-mini"></div>
            </div>
            
            <div class="text-center">
                <p class="text-[8px] font-mono opacity-10 uppercase tracking-[0.4em]">Biometric_Link_Standby</p>
            </div>
        </div>
    </div>

    <div class="max-w-xl text-center mt-6 text-zinc-500 text-xs space-y-2">
        <p><strong class="text-zinc-300 uppercase">Pocket Mode Sharp:</strong> Versi tanpa *rounded corner*. Semua elemen menggunakan sudut tajam dan miring (*skewed*) untuk memperkuat kesan industrial.</p>
    </div>

</body>
</html>
