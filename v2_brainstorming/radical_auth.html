<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Modern Rebel Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;700&family=Permanent+Marker&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-graffiti { font-family: 'Permanent Marker', cursive; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .cross-lines {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.03),
                rgba(255, 255, 255, 0.03) 10px,
                transparent 10px,
                transparent 20px
            );
        }

        .hazard-bg {
            background: repeating-linear-gradient(
                -45deg,
                #ccff00,
                #ccff00 10px,
                #000 10px,
                #000 20px
            );
        }

        .btn-radical {
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="cross-lines min-h-screen flex items-center justify-center p-4">

    <!-- CONTAINER MOBILE VIEW -->
    <div class="w-full max-w-md bg-zinc-950 border-[10px] border-white min-h-[85vh] relative overflow-hidden flex flex-col p-8 shadow-[0_0_50px_rgba(255,255,255,0.1)]">
        
        <!-- GRAFFITI TAG BACKGROUND -->
        <div class="font-graffiti text-white/5 text-9xl absolute -right-10 top-20 rotate-90 pointer-events-none">STREET</div>

        <!-- PAGE 1: LOGIN -->
        <div id="login-page" class="space-y-10 flex-1 flex flex-col">
            <header class="relative pt-8">
                <div class="font-graffiti text-[#ccff00] text-6xl transform -rotate-12 absolute -top-4 -left-2 drop-shadow-2xl">LARI</div>
                <h1 class="text-8xl font-bebas leading-none tracking-tighter ml-4 mt-4">LOG <span class="bg-white text-black px-2">IN</span></h1>
                <p class="text-[10px] font-mono opacity-40 tracking-[0.3em] mt-4 uppercase">Welcome back to the movement.</p>
            </header>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#ccff00]">Email Address</label>
                    <input type="text" placeholder="name@email.com" class="w-full bg-zinc-900 border-none p-4 mt-1 font-mono text-sm focus:ring-2 focus:ring-[#ccff00] outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#ccff00]">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-zinc-900 border-none p-4 mt-1 font-mono text-sm focus:ring-2 focus:ring-[#ccff00] outline-none">
                </div>
            </div>

            <div class="pt-4 flex-1">
                <button class="w-full bg-[#ccff00] text-black font-bebas text-5xl py-4 btn-radical hover:scale-105 transition-transform active:brightness-75">
                    LOG IN
                </button>
                <div class="mt-8 flex flex-col items-center gap-4">
                    <button onclick="showPage('register')" class="text-xs font-black border-b-2 border-white pb-1 tracking-widest hover:text-[#ccff00] hover:border-[#ccff00] uppercase">Create new account</button>
                    <button class="text-[10px] opacity-30 font-mono italic uppercase">Forgot Password?</button>
                </div>
            </div>
        </div>

        <!-- PAGE 2: REGISTER -->
        <div id="register-page" class="hidden space-y-8 flex-1 flex flex-col">
            <header>
                <h1 class="text-7xl font-bebas leading-none tracking-tighter">REGIS<span class="text-[#ccff00]">TER</span></h1>
                <p class="text-[10px] font-mono opacity-40 tracking-[0.3em] mt-2 uppercase">Join the global community.</p>
            </header>

            <div class="space-y-4">
                <input type="text" placeholder="FULL NAME" class="w-full bg-zinc-900 border-l-4 border-[#ccff00] p-4 font-mono text-sm outline-none">
                <input type="text" placeholder="EMAIL" class="w-full bg-zinc-900 border-l-4 border-white p-4 font-mono text-sm outline-none">
                <input type="password" placeholder="PASSWORD" class="w-full bg-zinc-900 border-l-4 border-white p-4 font-mono text-sm outline-none">
            </div>

            <!-- FACTION SELECTION -->
            <div class="space-y-3">
                <p class="text-[10px] font-black uppercase tracking-widest text-[#ccff00]">Select Faction Color</p>
                <div class="grid grid-cols-7 gap-1">
                    <div class="h-10 bg-[#ccff00] cursor-pointer hover:scale-110 transition-all border border-white"></div>
                    <div class="h-10 bg-[#ff007a] cursor-pointer hover:scale-110 transition-all"></div>
                    <div class="h-10 bg-[#00f0ff] cursor-pointer hover:scale-110 transition-all"></div>
                    <div class="h-10 bg-[#ff5f00] cursor-pointer hover:scale-110 transition-all"></div>
                    <div class="h-10 bg-[#bc00ff] cursor-pointer hover:scale-110 transition-all"></div>
                    <div class="h-10 bg-[#fff000] cursor-pointer hover:scale-110 transition-all"></div>
                    <div class="h-10 bg-[#ff0000] cursor-pointer hover:scale-110 transition-all"></div>
                </div>
            </div>

            <div class="pt-4 flex-1 flex flex-col items-end">
                <button class="w-[65%] bg-white text-black font-bebas text-5xl py-4 btn-radical hover:bg-[#ccff00] transition-colors">
                    SIGN UP
                </button>
                <div class="mt-6 text-right w-full">
                    <button onclick="showPage('login')" class="text-xs font-black border-b-2 border-white pb-1 tracking-widest uppercase">Already have an account?</button>
                </div>
            </div>
        </div>

        <!-- FOOTER PATTERN -->
        <div class="absolute bottom-0 left-0 w-full h-4 hazard-bg opacity-50"></div>
    </div>

    <script>
        function showPage(page) {
            if (page === 'register') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('register-page').classList.remove('hidden');
            } else {
                document.getElementById('register-page').classList.add('hidden');
                document.getElementById('login-page').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
