<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Original High-Impact Post-Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@500;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-graffiti { font-family: 'Permanent Marker', cursive; }
        
        .container-mobile {
            width: 380px;
            height: 800px;
            background-color: #000;
            border: 8px solid #fff;
            position: relative;
            overflow: hidden;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
        }

        .map-hero {
            height: 55%;
            background: url('https://api.mapbox.com/styles/v1/mapbox/dark-v11/static/108.48,-6.98,14,0/800x1200?access_token=pk.placeholder') center center;
            background-size: cover;
            position: relative;
            border-bottom: 4px solid #ccff00;
        }

        /* CONQUEST GLOW EFFECT */
        .conquest-polygon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            background: rgba(204, 255, 0, 0.2);
            border: 3px solid #ccff00;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.6);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transform: translate(-50%, -50%) rotate(15deg);
        }

        .secured-stamp {
            position: absolute;
            top: 30px;
            right: -15px;
            background: #fff;
            color: #000;
            padding: 5px 35px;
            font-family: 'Bebas Neue';
            font-size: 28px;
            transform: rotate(15deg);
            box-shadow: 8px 8px 0 #ccff00;
            z-index: 10;
        }

        /* PARALLEL SLANT METRICS - HORIZONTAL VERSION */
        .stat-group {
            display: flex;
            align-items: stretch;
            flex: 1;
        }
        .stat-label {
            background-color: #ccff00;
            color: #000;
            padding: 4px 15px 4px 10px;
            clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
            font-weight: 800;
            font-size: 8px;
            z-index: 10;
        }
        .stat-value {
            background-color: #1a1a1e;
            color: #fff;
            padding: 6px 10px 6px 15px;
            clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%);
            margin-left: -10px;
            font-family: 'Bebas Neue';
            font-size: 1.8rem;
            line-height: 1;
            flex: 1;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .xp-badge-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #ccff00;
            color: #000;
            padding: 4px 12px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 12px;
            z-index: 20;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
        }

        .btn-radical {
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

    </style>
</head>
<body class="bg-zinc-950 flex flex-col items-center py-10">

    <div class="container-mobile">
        <!-- TOP AREA: THE CONQUEST MAP -->
        <div class="map-hero">
            <div class="conquest-polygon"></div>
            <div class="secured-stamp uppercase tracking-widest italic">SECTOR_SECURED</div>
            
            <!-- XP OVERLAY ON MAP -->
            <div class="xp-badge-overlay">+250_XP_GAINED</div>
            
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
            
            <div class="absolute bottom-4 left-6">
                <p class="text-[8px] font-mono text-[#ccff00] mb-1">RECON_ID: 32.08.15</p>
                <h1 class="text-3xl font-bebas leading-none tracking-tight">KEC. CILIMUS</h1>
            </div>
        </div>

        <!-- BOTTOM AREA: FULL SUMMARY -->
        <div class="flex-1 bg-black p-6 flex flex-col justify-between">
            
            <div class="space-y-8">
                <div class="flex items-center gap-3">
                    <div class="w-1 h-8 bg-white opacity-20"></div>
                    <h2 class="text-3xl font-bebas tracking-widest italic uppercase">Mission_Report</h2>
                </div>

                <!-- METRICS ROW (DIST & PACE SEBARIS) -->
                <div class="flex gap-4">
                    <div class="stat-group">
                        <div class="stat-label flex flex-col justify-center">DIST</div>
                        <div class="stat-value">12.45<span class="text-[10px] text-zinc-600 ml-1">KM</span></div>
                    </div>
                    <div class="stat-group">
                        <div class="stat-label flex flex-col justify-center">PACE</div>
                        <div class="stat-value">05:20<span class="text-[10px] text-zinc-600 ml-1">/KM</span></div>
                    </div>
                </div>

                <!-- ADDITIONAL INFO -->
                <div class="grid grid-cols-2 gap-4 opacity-60">
                   <div class="border-l border-zinc-800 pl-3">
                       <p class="text-[7px] font-black uppercase">Calories</p>
                       <p class="text-xl font-bebas">840 KCAL</p>
                   </div>
                   <div class="border-l border-zinc-800 pl-3">
                       <p class="text-[7px] font-black uppercase">Duration</p>
                       <p class="text-xl font-bebas">45:12</p>
                   </div>
                </div>
            </div>

            <!-- ACTIONS -->
            <div class="space-y-4 pt-4">
                <button class="w-full bg-[#ccff00] text-black font-bebas text-4xl py-4 btn-radical uppercase">
                    Back to Nexus
                </button>
                <p class="text-center text-[8px] font-mono opacity-20 uppercase tracking-[0.4em]">Grid sync confirmed</p>
            </div>

        </div>
    </div>

</body>
</html>
