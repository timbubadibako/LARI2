<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARI V3 - Navigation Showdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #111; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .mobile-screen {
            width: 360px;
            height: 640px;
            background-color: #000;
            border: 8px solid #333;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .map-placeholder {
            flex: 1;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hazard-bg {
            background: repeating-linear-gradient(-45deg, #ccff00, #ccff00 5px, #000 5px, #000 10px);
        }

        .skew-island {
            clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
        }

        .node-btn {
            clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-wrap items-center justify-center gap-12 p-8 bg-zinc-900">

    <!-- OPTION 1: FIXED INDUSTRIAL DOCK -->
    <div class="flex flex-col items-center gap-4">
        <p class="font-bebas text-2xl tracking-widest text-zinc-500">01. FIXED INDUSTRIAL DOCK</p>
        <div class="mobile-screen">
            <div class="map-placeholder">LIVE_MAP_RECON_ZONE</div>
            
            <!-- THE NAV -->
            <nav class="bg-black border-t-8 border-white p-4 flex justify-around items-center">
                <div class="text-[#ccff00] flex flex-col items-center">
                    <div class="w-8 h-8 border-2 border-[#ccff00] flex items-center justify-center mb-1">
                        <div class="w-4 h-4 bg-[#ccff00]"></div>
                    </div>
                    <span class="text-[8px] font-black tracking-widest uppercase">Nexus</span>
                </div>
                <div class="text-white opacity-40 flex flex-col items-center">
                    <div class="w-8 h-8 border-2 border-white flex items-center justify-center mb-1 rotate-45"></div>
                    <span class="text-[8px] font-black tracking-widest uppercase">History</span>
                </div>
                <div class="text-white opacity-40 flex flex-col items-center">
                    <div class="w-8 h-8 border-2 border-white flex items-center justify-center mb-1"></div>
                    <span class="text-[8px] font-black tracking-widest uppercase">Social</span>
                </div>
                <div class="text-white opacity-40 flex flex-col items-center">
                    <div class="w-8 h-8 border-2 border-white flex items-center justify-center mb-1 rounded-full"></div>
                    <span class="text-[8px] font-black tracking-widest uppercase">Profile</span>
                </div>
            </nav>
        </div>
    </div>

    <!-- OPTION 2: FLOATING SKEWED ISLAND -->
    <div class="flex flex-col items-center gap-4">
        <p class="font-bebas text-2xl tracking-widest text-zinc-500">02. FLOATING SKEWED ISLAND</p>
        <div class="mobile-screen">
            <div class="map-placeholder">LIVE_MAP_RECON_ZONE</div>
            
            <!-- THE NAV -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[90%]">
                <div class="bg-white p-1 transform -rotate-1 skew-x-3 shadow-[10px_10px_0_rgba(204,255,0,0.5)]">
                    <nav class="bg-black p-4 flex justify-between items-center px-8">
                        <div class="w-6 h-6 bg-[#ccff00]"></div>
                        <div class="w-6 h-6 border-2 border-white"></div>
                        <div class="w-6 h-6 border-2 border-white rotate-12"></div>
                        <div class="w-6 h-6 border-2 border-white rounded-full"></div>
                    </nav>
                </div>
                <div class="mt-2 text-right">
                    <span class="bg-[#ccff00] text-black text-[8px] font-black px-2 uppercase tracking-tighter italic">Mode: Rogue_Movement</span>
                </div>
            </div>
        </div>
    </div>

    <!-- OPTION 3: CORNER TACTICAL NODES -->
    <div class="flex flex-col items-center gap-4">
        <p class="font-bebas text-2xl tracking-widest text-zinc-500">03. CORNER TACTICAL NODES</p>
        <div class="mobile-screen p-6">
            <div class="map-placeholder border border-zinc-800">LIVE_MAP_RECON_ZONE</div>
            
            <!-- BOTTOM LEFT NODES -->
            <div class="absolute bottom-10 left-6 space-y-4">
                <div class="node-btn w-14 h-14 bg-white flex items-center justify-center">
                    <div class="w-6 h-6 bg-black"></div>
                </div>
                <div class="node-btn w-14 h-14 bg-zinc-900 border-2 border-white flex items-center justify-center opacity-50">
                    <div class="w-6 h-6 border-2 border-white"></div>
                </div>
            </div>

            <!-- BOTTOM RIGHT NODES -->
            <div class="absolute bottom-10 right-6 space-y-4">
                <div class="node-btn w-14 h-14 bg-zinc-900 border-2 border-white flex items-center justify-center opacity-50">
                    <div class="w-6 h-6 border-2 border-white rounded-full"></div>
                </div>
                <div class="node-btn w-14 h-14 bg-[#ccff00] flex items-center justify-center shadow-[0_0_20px_rgba(204,255,0,0.4)]">
                    <div class="w-6 h-6 bg-black rotate-45"></div>
                </div>
            </div>

            <!-- CENTER SCANNER EFFECT -->
            <div class="absolute bottom-12 left-1/2 -translate-x-1/2">
                <div class="text-[8px] font-mono opacity-20 animate-pulse uppercase tracking-[0.4em]">Grid_Lock_Active</div>
            </div>
        </div>
    </div>

</body>
</html>
