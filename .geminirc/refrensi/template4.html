<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STRIDE_IO - Nexus Overview</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; background: #010413; color: #f1f5f9; }
        .font-bulky { font-family: 'DM Serif Display', serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38bdf8",
                        sapphire: "#0ea5e9",
                        background: "#010413",
                    },
                    fontFamily: {
                        bulky: ["DM Serif Display", "serif"],
                        body: ["Jost", "sans-serif"],
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background overflow-x-hidden min-h-screen">
    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 glass border-b border-white/5">

        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="min-h-screen pt-24 pb-32 px-6 relative flex flex-col items-center justify-center max-w-4xl mx-auto">
        <!-- Cyber Grid Background -->
        <div class="absolute inset-0 cyber-grid pointer-events-none opacity-40"></div>

        <!-- Nexus Status Card -->
        <div class="relative w-full glass rounded-[3rem] p-12 border border-white/10 shadow-2xl space-y-12">
            <!-- Header -->
            <div class="flex justify-between items-start">
                <div class="space-y-2">
                    <p class="text-[10px] uppercase tracking-[0.5em] text-primary font-bold">Active Protocol</p>
                    <h1 class="font-bulky italic text-6xl text-white tracking-tighter leading-none">Nexus Prime</h1>
                </div>
                <div class="flex items-center gap-4 bg-primary/10 px-6 py-3 rounded-full border border-primary/20">
                    <div class="w-2 h-2 bg-primary rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em]">Online</span>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[2.5rem] border border-white/5 space-y-4">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Current Dominion</span>
                    <div class="flex items-baseline gap-2">
                        <span class="font-bulky italic text-5xl text-white leading-none">84.2</span>
                        <span class="text-xs font-bold text-primary italic">%</span>
                    </div>
                    <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div class="w-[84.2%] h-full bg-primary shadow-[0_0_10px_rgba(56,189,248,0.5)]"></div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border border-white/5 space-y-4">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Circuit Sync</span>
                    <div class="flex items-baseline gap-2">
                        <span class="font-bulky italic text-5xl text-white leading-none">0.8s</span>
                    </div>
                    <p class="text-[10px] text-slate-400 italic">Latency optimized for urban tracking.</p>
                </div>
            </div>

            <!-- Recent Activity List -->
            <div class="space-y-6">
                <h3 class="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-bold border-b border-white/5 pb-4">Real-time Telemetry</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-4 glass rounded-2xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
                                <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-width="2" stroke-linecap="round"></path></svg>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-200">Elevation Peak</p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">+120M Reached</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-600">02:14 PM</span>
                    </div>

                    <div class="flex justify-between items-center p-4 glass rounded-2xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20">
                                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round"></path></svg>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-200">Checkpoint Alpha</p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Verified & Synced</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-600">01:45 PM</span>
                    </div>
                </div>
            </div>

            <!-- Footer Action -->
            <div class="pt-8 border-t border-white/5 flex justify-between items-center">
                <p class="font-bulky italic text-2xl text-primary leading-none">STRIDE_IO</p>
                <button class="bg-primary text-black px-8 py-3 rounded-full font-bold uppercase text-[9px] tracking-[0.2em] active:scale-95 transition-all">Initiate Sync</button>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full px-8 py-4 flex justify-around items-center z-50 border border-white/10 shadow-2xl">
        <div class="text-primary scale-110"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></div>
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A2 2 0 013 15.483V6.517a2 2 0 011.553-1.943l12-3a2 2 0 012.447 1.943v8.966a2 2 0 01-1.553 1.943l-4.447 1.112" stroke-width="2"></path></svg></div>

        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg></div>
    </nav>
</body>
</html>
