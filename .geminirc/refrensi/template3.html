<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STRIDE_IO - Territory Claim</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; background: #010413; color: #f1f5f9; }
        .font-bulky { font-family: 'DM Serif Display', serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38bdf8",
                        sapphire: "#0ea5e9",
                        background: "#010413",
                    },
                    fontFamily: {
                        bulky: ["DM Serif Display", "serif"],
                        body: ["Jost", "sans-serif"],
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background overflow-x-hidden min-h-screen">
    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 glass border-b border-white/5">
        <div class="flex items-center gap-6">
            <div class="text-primary">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"></path></svg>
            </div>
            <span class="font-bulky italic text-2xl tracking-tighter text-white uppercase">STRIDE_IO</span>
        </div>
        <div class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden">
            <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUiWHfd1yLw1HTrXkoK6dGrE_qpV_eQnyWkOpeZfKJLVkYRatMs6SqihYSd9pCSKWVZLVnIpQPH9OrGa9tp0Ez2YC6LefVL-ZRdjxs5hmuRZCqAVWz0Nq2w7_nSCflJAReZred_EvhFqhJTTI4PGhxlee-o3Sf6XYGz9y4RatK-Cg59UDYCFX4kGnQh7llIHkk-f1qhpvrIRt0kSrHK8nZAaP2MS_SahNgQnTL45WQulG-PASk28p1AICFav4W5HBqwMs06XkYyyk" />
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="min-h-screen pt-24 pb-32 px-6 relative flex flex-col items-center justify-center max-w-4xl mx-auto">
        <!-- Cyber Grid Background -->
        <div class="absolute inset-0 cyber-grid pointer-events-none opacity-40"></div>

        <!-- Share Card Container -->
        <div class="relative w-full aspect-[4/5] glass rounded-[3rem] overflow-hidden shadow-2xl border border-white/10 group">
            <!-- Background Map Layer -->
            <div class="absolute inset-0 z-0">
                <img class="w-full h-full object-cover opacity-40 grayscale contrast-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCW8dDVNkGl_BLn_kdxdIJFhj7soRd7TEX6qIywmcSc0iluOWvI-pLYDm2ISwNXMCk7MYpGw56JTUDk7mRGPzHFqZ9PWaGLig8Wke3gvjmOGQk6tcCZQi_9FkLss6yBDg28uP3BPrsfSt_M_sgxTotbyyz5q_lBFdmMNJ0cRcyijJEgYV_AS2WFf7yr12ysUVi_QyPTkqVkt_cPj9jfhJwVvmEs2PFAVEav2-a5skvD_EccLQbCPKV9gLarRHgQbo0j25Z3BWLFVYk" />
                <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-90"></div>
            </div>

            <!-- Faction Shield Badge (Top Right) -->
            <div class="absolute top-10 right-10 z-20">
                <div class="flex items-center gap-3 px-5 py-2 glass border border-primary/40 rounded-full backdrop-blur-3xl">
                    <svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 4.946-2.397 9.331-6 12.127A11.946 11.946 0 0110 20c-1.028 0-2.025-.129-2.977-.374C3.397 16.331 1 11.947 1 7c0-.68.056-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                    <span class="text-[9px] font-bold text-primary tracking-[0.2em] uppercase">Cyber Knights</span>
                </div>
            </div>

            <!-- Central Data Cluster -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-10 text-center px-12">
                <div class="mb-10">
                    <span class="inline-block px-4 py-1 glass border border-primary/20 text-primary font-bold text-[9px] uppercase tracking-[0.3em] rounded-full mb-6">Territory Secured</span>
                    <h2 class="font-bulky italic text-6xl text-white tracking-tighter leading-none mb-4">Kuningan District</h2>
                    <div class="h-px w-24 bg-primary/40 mx-auto"></div>
                </div>
                
                <div class="glass px-10 py-6 rounded-[2.5rem] border border-white/5 flex flex-col items-center">
                    <span class="font-bulky italic text-6xl text-white leading-none">12</span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-3">Hexagons Claimed</span>
                </div>
            </div>

            <!-- Bottom Share Overlay -->
            <div class="absolute bottom-10 left-10 right-10 z-20 flex justify-between items-end">
                <!-- Metrics Left -->
                <div class="flex gap-10">
                    <div class="flex flex-col gap-1">
                        <span class="text-slate-500 font-bold text-[9px] uppercase tracking-widest">Total EXP</span>
                        <span class="text-primary font-bulky italic text-3xl leading-none">+2,450</span>
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-slate-500 font-bold text-[9px] uppercase tracking-widest">Dominance</span>
                        <span class="text-white font-bulky italic text-3xl leading-none">68%</span>
                    </div>
                </div>
                
                <!-- Footer Right -->
                <div class="flex flex-col items-end gap-2">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                        <span class="text-slate-500 text-[8px] font-bold uppercase tracking-widest">ID: #8821-X9</span>
                    </div>
                    <p class="font-bulky italic text-lg text-primary leading-none">STRIDE_IO</p>
                </div>
            </div>
        </div>

        <!-- Action HUD -->
        <div class="mt-12 flex flex-wrap justify-center gap-6">
            <button class="bg-primary text-black px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary/20">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"></path></svg>
                Export Card
            </button>
            <button class="glass px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] border border-white/10 text-white hover:bg-white/5 transition-all active:scale-95">
                Full Details
            </button>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full px-8 py-4 flex justify-around items-center z-50 border border-white/10 shadow-2xl">
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"></path></svg></div>
        <div class="text-primary scale-110"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12 1.586l-4.586 4.586L2 1.586V15l.001.001L2 15l2 2h12l2-2V1.586l-4.586 4.586L12 1.586zM4 15V3.414L7.586 7 4 10.586V15zm2.414 0h11.172L14 11.414 10.414 15H6.414zM17.586 7L20 4.586V15l-2.414-2.414L17.586 7z" clip-rule="evenodd"></path></svg></div>
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"></path></svg></div>
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg></div>
    </nav>
</body>
</html>
