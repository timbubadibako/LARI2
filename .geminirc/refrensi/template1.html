<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STRIDE_IO - Mission Snapshot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        body { 
            font-family: 'Jost', sans-serif; 
            background: #010413; 
            color: #f1f5f9; 
            margin: 0;
            overflow-x: hidden;
        }
        .font-bulky { font-family: 'DM Serif Display', serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-sapphire { background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(56, 189, 248, 0.02) 100%); backdrop-filter: blur(30px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .text-sapphire { background: linear-gradient(to bottom, #7dd3fc, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-glow { box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38bdf8",
                        sapphire: "#0ea5e9",
                        background: "#010413",
                        surface: "rgba(15, 23, 42, 0.6)",
                    },
                    fontFamily: {
                        bulky: ["DM Serif Display", "serif"],
                        body: ["Jost", "sans-serif"],
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background text-slate-200">
    <!-- TOP APP BAR -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 glass border-b border-white/5">
        <div class="flex items-center gap-6">
            <div class="text-primary">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"></path></svg>
            </div>
            <span class="font-bulky italic text-3xl tracking-tighter text-white">STRIDE_IO</span>
        </div>
        <div class="flex items-center gap-8">
            <nav class="hidden md:flex gap-10 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-500">
                <a class="text-primary" href="#">Nexus</a>
                <a class="hover:text-white transition-colors" href="#">Territory</a>
                <a class="hover:text-white transition-colors" href="#">History</a>
                <a class="hover:text-white transition-colors" href="#">Circuit</a>
            </nav>
            <div class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden">
                <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv7EpAPwSQD4c4bTqkSWfd01wchuA1z0-rVnltnO4i-2h94gBqPoqeEQeWvgy05FDxIOCPRAPArV6zJyYRkoWVDCUrzslDaFgQMbpjoIHgGUzam8IRKuREHQEWByu-q285V5uGGwogz28ce3d32tyXpzVuASaCi0ur9WtIgaoe_cz8OhoAg0L7MLuO0L98GPN2OJsqoZxVzAFJ0OqC09ntFp1g578J1Qyh74ZzxhkwTm3jfYk7xQtdNNXazT3fR5Lc6_C0z06Rjq4" />
            </div>
        </div>
    </header>

    <main class="min-h-screen pt-32 pb-40 px-6 flex flex-col items-center justify-center max-w-5xl mx-auto">
        <!-- MAIN GRID SHARE CARD -->
        <div class="w-full relative group">
            <!-- Background Map Fragment -->
            <div class="absolute inset-0 rounded-[3rem] overflow-hidden opacity-20 pointer-events-none">
                <div class="w-full h-full bg-slate-900" style="background: url('https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/12/2144/1454.png'); background-size: cover; filter: brightness(0.4) saturate(0.5);"></div>
            </div>

            <!-- GLASSMORPHISM OVERLAY -->
            <div class="relative glass rounded-[3rem] p-12 md:p-16 flex flex-col gap-12 border border-white/10 shadow-2xl">
                <!-- HEADER SECTION -->
                <div class="flex flex-col gap-2">
                    <p class="text-[10px] uppercase tracking-[0.5em] text-primary font-bold">Protocol Alpha</p>
                    <h1 class="font-bulky italic text-7xl text-white leading-none tracking-tighter">Mission Zenith</h1>
                    <div class="flex items-center gap-4 mt-2">
                        <div class="h-px w-12 bg-primary/30"></div>
                        <span class="text-[9px] uppercase tracking-[0.3em] text-slate-500 font-bold">The Grid Captured</span>
                    </div>
                </div>

                <!-- STATS ROW -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-12 py-10 border-y border-white/5">
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Distance</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-4xl font-bulky italic text-white">12.4</span>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-widest">KM</span>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Pace</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-4xl font-bulky italic text-white">5:24</span>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-widest">/KM</span>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Calories</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-4xl font-bulky italic text-white">840</span>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-widest">KCAL</span>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Elevation</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-4xl font-bulky italic text-white">120</span>
                            <span class="text-[10px] font-bold text-primary uppercase tracking-widest">M</span>
                        </div>
                    </div>
                </div>

                <!-- FOOTER SECTION -->
                <div class="flex justify-between items-end">
                    <div class="flex gap-4">
                        <span class="px-4 py-1 rounded-full border border-primary/20 text-[8px] uppercase font-bold tracking-widest text-primary bg-primary/5">Formal</span>
                        <span class="px-4 py-1 rounded-full border border-primary/20 text-[8px] uppercase font-bold tracking-widest text-primary bg-primary/5">Elite</span>
                    </div>
                    <div class="text-right">
                        <p class="font-bulky italic text-2xl text-primary leading-none">STRIDE_IO</p>
                        <p class="text-[8px] uppercase tracking-[0.2em] text-slate-500 font-bold mt-1">The Grid Awaits</p>
                    </div>
                </div>
            </div>
            
            <!-- Accent Decoration -->
            <div class="absolute -top-4 -right-4 w-24 h-24 bg-primary/10 rounded-full blur-3xl"></div>
        </div>

        <!-- CALL TO ACTION -->
        <div class="mt-16 flex flex-wrap justify-center gap-6">
            <button class="bg-primary text-black px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary/20">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"></path></svg>
                Publish to Grid
            </button>
            <button class="glass px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] border border-white/10 text-white hover:bg-white/5 transition-all active:scale-95">
                Export Telemetry
            </button>
        </div>
    </main>

    <!-- MOBILE NAV -->
    <nav class="md:hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full px-8 py-4 flex justify-between items-center z-50 border border-white/10 shadow-2xl">
        <div class="text-primary">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
        </div>
        <div class="text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="2"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"></path></svg>
        </div>
        <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center -mt-12 shadow-lg shadow-primary/40 border-4 border-background">
            <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3" stroke-linecap="round"></path></svg>
        </div>
        <div class="text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"></path></svg>
        </div>
        <div class="text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg>
        </div>
    </nav>
</body>
</html>
