<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STRIDE_IO Performance Snapshot</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; background: #010413; color: #f1f5f9; }
        .font-bulky { font-family: 'DM Serif Display', serif; }
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-sapphire { background: linear-gradient(to bottom, #7dd3fc, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .holographic-path {
            stroke-dasharray: 6;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38bdf8",
                        sapphire: "#0ea5e9",
                        background: "#010413",
                    },
                    fontFamily: {
                        bulky: ["DM Serif Display", "serif"],
                        body: ["Jost", "sans-serif"],
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 glass border-b border-white/5">
        <div class="flex items-center gap-6">
            <div class="text-primary">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"></path></svg>
            </div>
            <span class="font-bulky italic text-2xl tracking-tighter text-white">STRIDE_IO</span>
        </div>
        <div class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden">
            <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv7EpAPwSQD4c4bTqkSWfd01wchuA1z0-rVnltnO4i-2h94gBqPoqeEQeWvgy05FDxIOCPRAPArV6zJyYRkoWVDCUrzslDaFgQMbpjoIHgGUzam8IRKuREHQEWByu-q285V5uGGwogz28ce3d32tyXpzVuASaCi0ur9WtIgaoe_cz8OhoAg0L7MLuO0L98GPN2OJsqoZxVzAFJ0OqC09ntFp1g578J1Qyh74ZzxhkwTm3jfYk7xQtdNNXazT3fR5Lc6_C0z06Rjq4" />
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="cyber-grid w-full max-w-[640px] aspect-square relative overflow-hidden rounded-[3rem] border border-white/10 shadow-2xl">
        <!-- Background Image with Filter -->
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-40 contrast-125 brightness-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBke3iD7uy3kVHNmwP5JgqQ-YDHH1Ngw2Mw9YuAAykEwLiHmMPJKHyCsfDwd9BRXb4LmWlKyQOYGC8yG1px_8SKpQIXP3-_3rY03EhO7SVJCZEL-ZgRDChLyBiVzNz6Gamnjqdkxs3FsgZJjquOfgWWcbLfyFyZ_zRpu_jKwrRC6QZgOIaLlnjsZ7ajdlvQVod0PKZA19YeeKS6_RSPKyv3EpnJjNTPWWN-c4Yke-CRUZQOY3n1HH9nheeWNo7kelN_IsHGBBlEcv0" />
            <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-90"></div>
        </div>

        <!-- Decorative UI Elements -->
        <div class="absolute inset-0 z-10 p-12 flex flex-col justify-between">
            <!-- Header Section (Top Right) -->
            <div class="flex flex-col items-end">
                <div class="flex items-center gap-4">
                    <span class="font-bulky italic text-3xl text-white tracking-tighter">Zenith Protocol</span>
                    <div class="h-px w-8 bg-primary"></div>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-500 mt-2">Elite Performance Grid</span>
            </div>

            <!-- Central Holographic Route -->
            <div class="absolute inset-0 flex items-center justify-center opacity-70">
                <svg class="w-3/4 h-3/4" viewBox="0 0 200 200">
                    <path class="holographic-path" d="M40,160 Q60,120 100,100 T160,40" fill="none" stroke="#38bdf8" stroke-width="2"></path>
                    <circle cx="40" cy="160" fill="#38bdf8" r="4" class="animate-pulse"></circle>
                    <circle cx="160" cy="40" fill="#7dd3fc" r="4"></circle>
                    <text class="font-bold text-[7px]" fill="#38bdf8" x="30" y="175" style="letter-spacing: 0.1em;">DEPARTURE</text>
                    <text class="font-bold text-[7px]" fill="#7dd3fc" x="155" y="30" style="letter-spacing: 0.1em;">TERMINAL</text>
                </svg>
            </div>

            <!-- Data Block (Bottom Left) -->
            <div class="w-fit">
                <div class="glass p-8 rounded-[2.5rem] flex flex-col gap-6 border border-white/10">
                    <div class="flex gap-10">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Distance</span>
                            <span class="font-bulky italic text-4xl text-white leading-none">12.4<span class="text-lg ml-1 text-primary italic">KM</span></span>
                        </div>
                        <div class="w-px h-10 bg-white/10 self-center"></div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Pace</span>
                            <span class="font-bulky italic text-4xl text-white leading-none">5:24</span>
                        </div>
                    </div>
                    <div class="h-px w-full bg-white/10"></div>
                    <div class="flex justify-between items-center gap-8">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Session Time</span>
                            <span class="text-xl font-bold text-slate-200">1:07:22</span>
                        </div>
                        <div class="flex gap-2 items-center bg-primary/10 px-4 py-2 rounded-full border border-primary/20">
                            <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                            <span class="text-[8px] font-bold text-primary uppercase tracking-widest">Elite Tier</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Corner Scanning Accents -->
        <div class="absolute top-0 left-0 w-16 h-16 border-t border-l border-primary/30 m-8 rounded-tl-3xl"></div>
        <div class="absolute bottom-0 right-0 w-16 h-16 border-b border-r border-primary/30 m-8 rounded-br-3xl"></div>
    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav class="md:hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass rounded-full px-8 py-4 flex justify-around items-center z-50 border border-white/10 shadow-2xl">
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"></path></svg></div>
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A2 2 0 013 15.483V6.517a2 2 0 011.553-1.943l12-3a2 2 0 012.447 1.943v8.966a2 2 0 01-1.553 1.943l-4.447 1.112" stroke-width="2"></path></svg></div>
        <div class="text-primary scale-110"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg></div>
        <div class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197" stroke-width="2"></path></svg></div>
    </nav>
</body>
</html>
