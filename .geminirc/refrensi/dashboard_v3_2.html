<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lari-Lari - Competitive Tactical Dashboard v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Jost', sans-serif; background: #010413; color: #f1f5f9; overflow: hidden; margin: 0; }
        .font-bulky { font-family: 'DM Serif Display', serif; }
        
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .map-bg {
            position: fixed;
            inset: 0;
            background: url('https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/12/2144/1454.png');
            background-size: cover;
            filter: brightness(0.4) saturate(1.2);
            z-index: -1;
        }

        /* Vertical Rail Transitions */
        .rail-item {
            width: 44px;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }
        .rail-item:hover { width: 180px; }

        /* Status Animations */
        @keyframes strobe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-strobe { animation: strobe 2s infinite; }

        .zone-contested {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0) 100%);
            border-left: 3px solid #ef4444;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Map Layer -->
    <div class="map-bg"></div>

    <!-- 01: Top discreet HUD -->
    <div class="p-6 flex justify-between items-start z-50">
        <!-- Branding & GPS -->
        <div class="space-y-2">
            <h1 class="text-xl font-bulky italic tracking-tight text-white uppercase">Lari-Lari</h1>
            <div class="flex items-center gap-2 bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/20 w-fit">
                <div class="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[7px] font-black text-emerald-400 uppercase tracking-widest">GPS Active</span>
            </div>
        </div>

        <!-- Compact Profile Bubble -->
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-[10px] font-black uppercase tracking-widest text-white">Ghost_Runner</p>
                <p class="text-[8px] font-bold text-slate-500 uppercase">Rank #12 • Kuningan</p>
            </div>
            <div class="w-12 h-12 rounded-2xl glass border-sky-500/30 flex items-center justify-center relative shadow-lg shadow-sky-500/10">
                <span class="material-symbols-outlined text-sky-400">person</span>
                <div class="absolute -top-1 -right-1 w-5 h-5 bg-sky-500 rounded-full border-2 border-[#010413] flex items-center justify-center">
                    <span class="text-[8px] font-black text-[#010413]">42</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 02: Vertical Competitive Rail (Left) -->
    <div class="absolute top-32 left-6 space-y-3 z-50">
        
        <!-- Daily Bounty Badge -->
        <div class="rail-item glass h-11 rounded-xl flex items-center p-1 cursor-pointer group shadow-xl">
            <div class="w-9 h-9 rounded-lg bg-amber-500/20 border border-amber-500/40 flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-amber-500 text-xl">military_tech</span>
            </div>
            <div class="ml-3 pr-4">
                <p class="text-[8px] font-black uppercase text-amber-500 tracking-widest">Daily Bounty</p>
                <p class="text-[10px] font-bold text-white uppercase">Capture 3 New Hexes</p>
            </div>
        </div>

        <!-- Active Buff Badge -->
        <div class="rail-item glass h-11 rounded-xl flex items-center p-1 cursor-pointer group shadow-xl">
            <div class="w-9 h-9 rounded-lg bg-indigo-500/20 border border-indigo-500/40 flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-indigo-400 text-xl">bolt</span>
            </div>
            <div class="ml-3 pr-4">
                <p class="text-[8px] font-black uppercase text-indigo-400 tracking-widest">Active Buff</p>
                <p class="text-[10px] font-bold text-white uppercase">1.5x XP Multiplier</p>
            </div>
        </div>

        <!-- Guild War Info -->
        <div class="rail-item glass h-11 rounded-xl flex items-center p-1 cursor-pointer group shadow-xl border-l-4 border-red-500">
            <div class="w-9 h-9 rounded-lg bg-red-500/20 flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-red-500 text-xl">swords</span>
            </div>
            <div class="ml-3 pr-4">
                <p class="text-[8px] font-black uppercase text-red-500 tracking-widest">Guild Contest</p>
                <p class="text-[10px] font-bold text-white uppercase">Vs Red Dragons</p>
            </div>
        </div>

    </div>

    <!-- 03: Territory Status Overlay (Floating Center) -->
    <div class="absolute top-24 left-1/2 -translate-x-1/2 z-40">
        <div class="glass px-6 py-2 rounded-full border-red-500/20 flex items-center gap-3 shadow-2xl animate-strobe">
            <span class="material-symbols-outlined text-red-500 text-sm">warning</span>
            <div class="h-4 w-px bg-white/10"></div>
            <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white">Zone: Contested Territory</span>
        </div>
    </div>

    <!-- Center Scan Context -->
    <main class="flex-1 flex items-center justify-center relative">
        <div class="relative">
            <!-- Ripple Rings -->
            <div class="absolute inset-0 w-48 h-48 -translate-x-1/2 -translate-y-1/2 border border-sky-500/10 rounded-full animate-ping" style="animation-duration: 4s;"></div>
            
            <!-- Radar Core -->
            <div class="w-16 h-16 glass rounded-full flex items-center justify-center border-sky-500/40 shadow-[0_0_30px_rgba(14,165,233,0.2)]">
                <span class="material-symbols-outlined text-sky-400 text-2xl">radar</span>
            </div>
        </div>
    </main>

    <!-- Bottom Action Area -->
    <footer class="relative pb-10 z-50">
        <!-- Start Button -->
        <div class="flex justify-center mb-[-48px] relative z-10">
            <button class="w-24 h-24 bg-[#0ea5e9] rounded-full flex flex-col items-center justify-center shadow-[0_20px_50px_rgba(14,165,233,0.4)] border-4 border-[#010413] hover:scale-105 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-[#010413] text-5xl mb-[-4px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                <span class="text-[9px] font-bulky italic font-black text-[#010413] tracking-widest mt-1">START</span>
            </button>
        </div>

        <!-- Minimalist Nav (Icon + Dot) -->
        <div class="px-6">
            <div class="glass max-w-sm mx-auto h-20 rounded-full flex items-center justify-between px-10 shadow-2xl border-white/10">
                <div class="flex flex-col items-center justify-center gap-1 cursor-pointer">
                    <span class="material-symbols-outlined text-2xl text-sky-400" style="font-variation-settings: 'FILL' 1;">explore</span>
                    <div class="w-1 h-1 rounded-full bg-sky-400 shadow-[0_0_5px_#38bdf8]"></div>
                </div>
                <div class="flex flex-col items-center justify-center gap-1 cursor-pointer group">
                    <span class="material-symbols-outlined text-2xl text-slate-500 group-hover:text-slate-300">history</span>
                    <div class="w-1 h-1 rounded-full bg-transparent"></div>
                </div>
                <div class="w-16"></div> <!-- Gap -->
                <div class="flex flex-col items-center justify-center gap-1 cursor-pointer group">
                    <span class="material-symbols-outlined text-2xl text-slate-500 group-hover:text-slate-300">groups</span>
                    <div class="w-1 h-1 rounded-full bg-transparent"></div>
                </div>
                <div class="flex flex-col items-center justify-center gap-1 cursor-pointer group">
                    <span class="material-symbols-outlined text-2xl text-slate-500 group-hover:text-slate-300">person</span>
                    <div class="w-1 h-1 rounded-full bg-transparent"></div>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
